services:
  database:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: budgeting
      POSTGRES_USER: budgeting
      POSTGRES_PASSWORD: budgeting
    volumes:
      - database:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budgeting -d budgeting"]
      interval: 5s
      timeout: 5s
      retries: 10
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy
volumes:
  database:
